- name: "Restart all NFS services, as required"
  ansible.builtin.service:
    name: "{{ setting.nm }}"
    state: "{{ 'restarted' if setting.st else 'stopped' }}"
  loop:
    - { nm: "{{ nfs_client_service_name }}",
        st: "{{ nfs_client_enable_nfsv3 or nfs_client_enable_nfsv4 }}" }
    - { nm: "{{ nfs_client_mapping_service_name }}",
        st: "{{ nfs_client_enable_nfsv4 and nfs_client_nfsv4_enable_useratdomain_mapping_service }}" }
    - { nm: "{{ nfs_client_delegation_service_name }}",
        st: "{{ nfs_client_enable_nfsv4 and nfs_client_nfsv4_enable_client_delegations }}" }
  loop_control:
    loop_var: setting
  become: true
  become_user: root
  listen: restart_nfs_client_services

- name: "Remount all NFS share entries in '{{ nfs_client_etc_fstab_filepath }}'"
  ansible.builtin.command:
    cmd: "mount -a"
  become: true
  become_user: root
  listen: restart_nfs_client_services

